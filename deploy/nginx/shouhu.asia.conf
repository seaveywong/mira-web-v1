server {
    listen 80;
    server_name shouhu.asia www.shouhu.asia;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shouhu.asia www.shouhu.asia;

    ssl_certificate /etc/letsencrypt/live/shouhu.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shouhu.asia/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-javascript image/svg+xml;

    root /opt/mira/frontend;
    index index.html;

    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location ~* (\.bak|bak_|\.old$|\.orig$|\.zip$|\.md$|\.py$|\.sqlite|\.db$|\.log$|\.env$) {
        return 404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        client_max_body_size 600m;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        gzip on;
        gzip_types application/json;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    location ~ /\. {
        deny all;
    }

    location ~ \.(env|log|db)$ {
        deny all;
    }

    access_log /var/log/nginx/mira_access.log;
    error_log /var/log/nginx/mira_error.log;
}
